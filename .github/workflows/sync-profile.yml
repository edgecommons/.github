name: sync-profile

# Regenerate the org landing page's component tables from edgecommons/registry, so adding or
# changing a component in the registry updates github.com/edgecommons on its own. Runs daily and
# on demand; commits profile/README.md only when it actually changed.
on:
  schedule:
    - cron: "17 6 * * *" # daily ~06:17 UTC
  workflow_dispatch: # run on demand (e.g. right after a registry change)

permissions:
  contents: write

concurrency:
  group: sync-profile
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github
        uses: actions/checkout@v4
      - name: Checkout registry (source of truth)
        uses: actions/checkout@v4
        with:
          repository: edgecommons/registry
          path: registry
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate the component tables
        run: node scripts/generate-profile.mjs registry/components.json profile/README.md
      - name: Commit if the landing page changed
        run: |
          if git diff --quiet -- profile/README.md; then
            echo "profile/README.md already in sync with the registry"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add profile/README.md
            git commit -m "chore(profile): sync component list from registry"
            git push
          fi
